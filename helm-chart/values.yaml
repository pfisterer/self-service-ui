---
#------------------------------------
# Self-Service UI Configuration
#------------------------------------

selfServiceUI:
  hostname: "self-service-ui.example.com"
  replicas: 1
  imagePullPolicy: "Always"
  image: "ghcr.io/pfisterer/self-service-ui"
  version: "latest"
  dynamicZonesBaseUrl: https://dyndnsapi.example.com

#------------------------------------
# OIDC/Auth Configuration
#------------------------------------
auth:
  oidc:
    issuerUrl: https://sso.example.cloud/realms/example
    clientId: example-cloud-dns

#------------------------------------
# Ingress Configuration
#------------------------------------
ingress:
  enabled: true
  # Default to Traefik (k3s) with no cert-manager annotation: TLS is served by
  # the cluster's wildcard default certificate. Override per environment.
  className: traefik
  annotations: {}
