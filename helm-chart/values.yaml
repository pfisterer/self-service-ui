---
#------------------------------------
# Self-Service UI Configuration
#------------------------------------

selfServiceUI:
  hostname: "self-service-ui.example.com"
  replicas: 1
  imagePullPolicy: "Always"
  image: "ghcr.io/pfisterer/self-service-ui"
  version: "latest"
  dynamicZonesBaseUrl: https://dyndnsapi.example.com
  # DHBW-internal ACME server (acme2certifier) shown on the TLS-Certificates tab.
  acmeServer: https://certificates.dhbw.cloud

#------------------------------------
# OIDC/Auth Configuration
#------------------------------------
auth:
  oidc:
    issuerUrl: https://sso.example.cloud/realms/example
    clientId: example-cloud-dns

#------------------------------------
# Ingress Configuration
#------------------------------------
ingress:
  enabled: true
  # Empty className -> field omitted -> cluster default IngressClass (Traefik on
  # k3s). No cert-manager annotation: TLS = cluster wildcard default cert.
  className: ""
  annotations: {}
