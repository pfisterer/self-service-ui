name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # The GitHub user that triggered the workflow
          password: ${{ secrets.GITHUB_TOKEN }} # The special GitHub token for workflows

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- ghcr retention (runs after the push, so counts include the new tag) ---
      # Keep only the newest pre-release "-test.N" tag
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          use-regex: true
          exclude-tags: '^latest$'
          delete-tags: '^\d+\.\d+\.\d+-test\.\d+$'
          keep-n-tagged: 1
      # Keep the newest 3 stable semver tags (X.Y.Z)
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          use-regex: true
          exclude-tags: '^latest$'
          delete-tags: '^v?\d+\.\d+\.\d+$'
          keep-n-tagged: 3
      # Delete all old pre-release "-alpha" tags
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          use-regex: true
          delete-tags: '^.*-alpha$'
      # Clean up untagged / ghost / orphaned leftovers
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          delete-untagged: true
          delete-ghost-images: true
          delete-orphaned-images: true
